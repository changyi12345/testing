<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <header>
        <div class="logo">
            <div class="logo__image">
                <img src="images/logo.png" class="logo__img" alt="Logo">
            </div>
        </div>
        <div class="menu">
            <ul class="menu__list">
                <li class="menu__item">
                    <a href="index.html" class="menu__link">home</a>
                </li>
                <li class="menu__item">
                    <a href="shop.html" class="menu__link">shop</a>
                </li>
                <li class="menu__item">
                    <a href="about.html" class="menu__link">about us</a>
                </li>
                <li class="menu__item">
                    <a href="contact.html" class="menu__link active">contact us</a>
                </li>
            </ul>
        </div>
        <div class="icon">
            <ul class="icon__list">
                <li class="icon__item">
                    <a href="#" class="icon__link"><i class="fa fa-user"></i></a>
                </li>
                <li class="icon__item">
                    <a href="#" class="icon__link"><i class="fa fa-heart"></i></a>
                </li>
                <li class="icon__item">
                    <a href="#" class="icon__link"><i class="fa fa-shopping-cart"></i></a>
                </li>
            </ul>
        </div>
    </header>

    <main>
        <h1 class="page__title">Contact Form</h1>
        <form class="form__container">
            <div class="form__group">
                <input type="text" placeholder="Enter your name" class="form__input">
                <input type="email" placeholder="Enter your email" class="form__input">
            </div>
            <input type="text" placeholder="Enter your subject" class="form__input">
            <textarea placeholder="Enter your message" class="form__input textarea"></textarea>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </main>

    <footer>
        <div class="footer__box">
            <h3 class="footer_title">quick links</h3>
            <ul class="footer__list">
                <li class="footer__item">
                    <a href="index.html" class="footer__link"><i class="fa fa-arrow-right"></i> home</a>
                </li>
                <li class="footer__item">
                    <a href="shop.html" class="footer__link"><i class="fa fa-arrow-right"></i> shop</a>
                </li>
                <li class="footer__item">
                    <a href="about.html" class="footer__link"><i class="fa fa-arrow-right"></i> about us</a>
                </li>
                <li class="footer__item">
                    <a href="contact.html" class="footer__link"><i class="fa fa-arrow-right"></i> contact us</a>
                </li>
            </ul>
        </div>
        <div class="footer__box">
            <h3 class="footer_title">account</h3>
            <ul class="footer__list">
                <li class="footer__item">
                    <a href="login.html" class="footer__link"><i class="fa fa-arrow-right"></i> login</a>
                </li>
                <li class="footer__item">
                    <a href="register.html" class="footer__link"><i class="fa fa-arrow-right"></i> register</a>
                </li>
                <li class="footer__item">
                    <a href="#" class="footer__link"><i class="fa fa-arrow-right"></i> my profile</a>
                </li>
            </ul>
        </div>
        <div class="footer__box">
            <h3 class="footer_title">others</h3>
            <ul class="footer__list">
                <li class="footer__item">
                    <a href="#" class="footer__link"><i class="fa fa-arrow-right"></i> FAQ</a>
                </li>
                <li class="footer__item">
                    <a href="#" class="footer__link"><i class="fa fa-arrow-right"></i> terms and conditions</a>
                </li>
                <li class="footer__item">
                    <a href="#" class="footer__link"><i class="fa fa-arrow-right"></i> privacy and policy</a>
                </li>
            </ul>
        </div>
        <div class="footer__box">
            <h3 class="footer_title">follow us</h3>
            <ul class="social__list">
                <li class="social__item">
                    <a href="#" class="social__link facebook"><i class="fab fa-facebook"></i></a>
                </li>
                <li class="social__item">
                    <a href="#" class="social__link telegram"><i class="fab fa-telegram"></i></a>
                </li>
                <li class="social__item">
                    <a href="#" class="social__link viber"><i class="fab fa-viber"></i></a>
                </li>
                <li class="social__item">
                    <a href="#" class="social__link youtube"><i class="fab fa-youtube"></i></a>
                </li>
                <li class="social__item">
                    <a href="#" class="social__link twitter"><i class="fab fa-twitter"></i></a>
                </li>
            </ul>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>

</html>
